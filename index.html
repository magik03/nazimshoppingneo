<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>غرفة السيرفرات | إدارة الحسابات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e14;
    --panel:#10161f;
    --panel-2:#161d29;
    --line:#1f2937;
    --text:#e6edf3;
    --muted:#7d8aa0;
    --accent:#2dd4bf;
    --accent-dim:#1a3936;
    --paid:#34d399;
    --due:#f87171;
    --due-dim:#3a1f24;
    --paid-dim:#16302a;
    --edit:#3b82f6;
    --edit-dim:#1e293b;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(45,212,191,0.07), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(248,113,113,0.05), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans Arabic', sans-serif;
    min-height:100vh;
    padding:28px 16px 60px;
  }
  .wrap{max-width:1100px; margin:0 auto;}

  /* HEADER */
  header{
    display:flex; align-items:center; gap:14px;
    margin-bottom:28px;
    padding-bottom:20px;
    border-bottom:1px solid var(--line);
  }
  .logo{
    width:46px; height:46px; border-radius:10px;
    background:linear-gradient(135deg, var(--accent), #0e7c70);
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace; font-weight:700; font-size:18px;
    color:#04211d; flex-shrink:0;
    box-shadow:0 0 0 1px rgba(45,212,191,0.3), 0 8px 24px -8px rgba(45,212,191,0.5);
  }
  header h1{font-size:20px; font-weight:700;}
  header p{font-size:13px; color:var(--muted); margin-top:2px;}

  /* STATS */
  .stats{
    display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap;
  }
  .stat{
    flex:1; min-width:120px;
    background:var(--panel); border:1px solid var(--line);
    border-radius:12px; padding:14px 16px;
  }
  .stat .num{font-family:'JetBrains Mono', monospace; font-size:24px; font-weight:700;}
  .stat .lbl{font-size:12px; color:var(--muted); margin-top:4px;}
  .stat.paid .num{color:var(--paid);}
  .stat.due .num{color:var(--due);}

  /* FORM CARD */
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:20px;
    margin-bottom:24px;
    transition: border-color 0.3s;
  }
  .card.editing-mode {
    border-color: var(--edit);
  }
  .card h2{
    font-size:14px; font-weight:600; color:var(--accent);
    display:flex; align-items:center; gap:8px; margin-bottom:16px;
    text-transform:uppercase; letter-spacing:0.5px;
  }
  .card.editing-mode h2 {
    color: var(--edit);
  }
  .card h2::before{
    content:''; display:block; width:8px; height:8px;
    border-radius:50%; background:var(--accent);
    box-shadow:0 0 0 4px var(--accent-dim);
  }
  .card.editing-mode h2::before {
    background: var(--edit);
    box-shadow: 0 0 0 4px var(--edit-dim);
  }
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:640px){.grid2{grid-template-columns:1fr;}}

  .field label{
    display:block; font-size:12px; color:var(--muted); margin-bottom:6px;
  }
  .field input, .field select{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:11px 12px;
    color:var(--text);
    font-size:14px;
    font-family:'IBM Plex Sans Arabic', sans-serif;
    transition:border-color .15s;
  }
  .field input:focus, .field select:focus{
    outline:none; border-color:var(--accent);
  }
  .card.editing-mode .field input:focus {
    border-color: var(--edit);
  }
  .field input::placeholder{color:#46546b; font-family:'JetBrains Mono', monospace; font-size:12px;}
  .field.full{grid-column:1/-1;}

  /* live preview */
  .preview{
    margin-top:16px;
    background:var(--panel-2);
    border:1px dashed var(--line);
    border-radius:10px;
    padding:14px;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
  }
  @media (max-width:640px){.preview{grid-template-columns:1fr;}}
  .preview .item .k{color:var(--muted); font-size:11px; margin-bottom:3px;}
  .preview .item .v{color:var(--accent); word-break:break-all;}
  .preview .item .v.empty{color:#4a5568;}

  .pay-toggle{display:flex; gap:10px; margin-top:6px;}
  .pay-toggle label{
    flex:1;
    display:flex; align-items:center; justify-content:center; gap:6px;
    border:1px solid var(--line); border-radius:8px;
    padding:11px; font-size:13px; cursor:pointer;
    background:var(--panel-2);
    transition:.15s;
  }
  .pay-toggle input{display:none;}
  .pay-toggle .dot{width:8px;height:8px;border-radius:50%;background:#46546b;}
  .pay-toggle input:checked + .dot{box-shadow:0 0 0 3px currentColor;}
  .pay-toggle .opt-paid input:checked ~ .dot{background:var(--paid); color:var(--paid-dim);}
  .pay-toggle .opt-due input:checked ~ .dot{background:var(--due); color:var(--due-dim);}
  .pay-toggle label:has(input:checked).opt-paid{border-color:var(--paid); background:var(--paid-dim); color:var(--paid);}
  .pay-toggle label:has(input:checked).opt-due{border-color:var(--due); background:var(--due-dim); color:var(--due);}

  .btn-group {
    display: flex; gap: 10px; margin-top: 18px;
  }
  .btn{
    flex: 1;
    background:var(--accent);
    color:#04211d;
    border:none; border-radius:10px;
    padding:13px;
    font-size:14px; font-weight:700;
    font-family:'IBM Plex Sans Arabic', sans-serif;
    cursor:pointer;
    transition:filter .15s, transform .1s;
  }
  .btn:hover{filter:brightness(1.08);}
  .btn:active{transform:scale(0.99);}
  .btn.btn-edit {
    background: var(--edit);
    color: #fff;
  }
  .btn.btn-cancel {
    background: var(--panel-2);
    color: var(--muted);
    border: 1px solid var(--line);
    flex: 0 0 120px;
  }

  /* LIST */
  .list-head{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px; gap:12px; flex-wrap:wrap;
  }
  .list-head h2{font-size:16px;}
  .search input{
    background:var(--panel); border:1px solid var(--line);
    border-radius:8px; padding:9px 14px; color:var(--text);
    font-size:13px; min-width:200px;
    font-family:'IBM Plex Sans Arabic', sans-serif;
  }
  .search input:focus{outline:none; border-color:var(--accent);}

  .empty{
    text-align:center; padding:50px 20px; color:var(--muted);
    border:1px dashed var(--line); border-radius:14px;
    font-size:14px;
  }
  .empty .big{font-size:32px; margin-bottom:10px;}

  .server-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px;
    margin-bottom:12px;
    position:relative;
    overflow:hidden;
  }
  .server-card::before{
    content:''; position:absolute; right:0; top:0; bottom:0; width:4px;
  }
  .server-card.paid::before{background:var(--paid);}
  .server-card.due::before{background:var(--due);}

  .sc-top{
    display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:10px;
  }
  .sc-name-area {
    display: flex; flex-direction: column; gap: 4px;
  }
  .sc-name{font-size:15px; font-weight:700; display:flex; align-items:center; gap:10px;}
  .sc-date{font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; margin-right:19px;}
  
  .led{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
  .led.paid{background:var(--paid); box-shadow:0 0 0 3px var(--paid-dim);}
  .led.due{background:var(--due); box-shadow:0 0 0 3px var(--due-dim); animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.35;}}

  .sc-code{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--muted);
    background:var(--panel-2); padding:3px 8px; border-radius:6px; border:1px solid var(--line);
    white-space:nowrap;
  }

  .sc-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px;
  }
  @media (max-width:640px){.sc-grid{grid-template-columns:1fr;}}
  .sc-field{
    background:var(--panel-2); border:1px solid var(--line); border-radius:8px;
    padding:9px 10px; font-family:'JetBrains Mono', monospace; font-size:12.5px;
    display:flex; justify-content:space-between; align-items:center; gap:8px;
    cursor:pointer;
  }
  .sc-field .v{overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text);}
  .sc-field .lab{color:var(--muted); font-size:10px; font-family:'IBM Plex Sans Arabic',sans-serif; flex-shrink:0; margin-left:6px;}
  .sc-field .copy{color:var(--accent); font-size:11px; flex-shrink:0; opacity:0; transition:.15s; font-family:'IBM Plex Sans Arabic',sans-serif;}
  .sc-field:hover .copy{opacity:1;}
  .sc-field:hover{border-color:var(--accent);}

  .sc-actions{display:flex; gap:8px; margin-top:12px; flex-wrap: wrap;}
  .pill{
    font-size:12px; padding:6px 14px; border-radius:20px; border:1px solid var(--line);
    background:var(--panel-2); color:var(--muted); cursor:pointer;
    font-family:'IBM Plex Sans Arabic', sans-serif;
    transition:.15s;
  }
  .pill:hover{border-color:var(--accent); color:var(--accent);}
  .pill.danger:hover{border-color:var(--due); color:var(--due);}
  .pill.edit-btn:hover{border-color:var(--edit); color:var(--edit);}
  .pill.status-toggle.paid{color:var(--paid); border-color:var(--paid-dim);}
  .pill.status-toggle.due{color:var(--due); border-color:var(--due-dim);}

  /* TOAST */
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--panel-2); border:1px solid var(--accent); color:var(--accent);
    padding:10px 20px; border-radius:30px; font-size:13px;
    opacity:0; transition:.25s; pointer-events:none; z-index:99;
    font-family:'IBM Plex Sans Arabic', sans-serif;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  
  /* تعديل شكل حقل التاريخ ليتناسب مع الثيم المظلم */
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.8) sepia(1) saturate(5) hue-rotate(130deg);
    cursor: pointer;
  }
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">SR</div>
    <div>
      <h1>غرفة السيرفرات</h1>
      <p>إدارة بيانات السيرفرات والحسابات الخاصة بك سحابياً</p>
    </div>
  </header>

  <div class="stats">
    <div class="stat"><div class="num" id="statTotal">0</div><div class="lbl">إجمالي السيرفرات</div></div>
    <div class="stat paid"><div class="num" id="statPaid">0</div><div class="lbl">مدفوعة</div></div>
    <div class="stat due"><div class="num" id="statDue">0</div><div class="lbl">عليها دين</div></div>
  </div>

  <div class="card" id="formCard">
    <h2 id="formTitle">إضافة سيرفر جديد</h2>
    <div class="grid2">
      <div class="field">
        <label>اسم السيرفر</label>
        <input type="text" id="inName" placeholder="مثال: سيرفر الخليج">
      </div>
      <div class="field">
        <label>الكود</label>
        <input type="text" id="inCode" placeholder="NEO1M138256123296">
      </div>
      <div class="field full">
        <label>رابط السيرفر (M3U Link)</label>
        <input type="text" id="inUrl" placeholder="https://example.com/get.php?username=...&password=...&type=m3u_plus&output=ts">
      </div>
      <div class="field full">
        <label>تاريخ نهاية الاشتراك</label>
        <input type="date" id="inDate">
      </div>
    </div>

    <div class="preview">
      <div class="item"><div class="k">الهوست (Host)</div><div class="v empty" id="prevHost">—</div></div>
      <div class="item"><div class="k">اليوزر (Username)</div><div class="v empty" id="prevUser">—</div></div>
      <div class="item"><div class="k">الباسورد (Password)</div><div class="v empty" id="prevPass">—</div></div>
    </div>

    <div class="field" style="margin-top:14px;">
      <label>حالة الدفع</label>
      <div class="pay-toggle">
        <label class="opt-paid">
          <input type="radio" name="payStatus" value="paid" checked>
          <span class="dot"></span> مدفوع
        </label>
        <label class="opt-due">
          <input type="radio" name="payStatus" value="due">
          <span class="dot"></span> دين
        </label>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn" id="btnAdd">إضافة السيرفر</button>
      <button class="btn btn-cancel" id="btnCancel" style="display: none;">إلغاء</button>
    </div>
  </div>

  <div class="list-head">
    <h2>السيرفرات المسجّلة</h2>
    <div class="search"><input type="text" id="search" placeholder="بحث بالاسم أو الهوست..."></div>
  </div>

  <div id="list"></div>

</div>

<div class="toast" id="toast"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDJOJyjfbb8YE5p3I4CgrAzl36qVUFWy5Q",
  authDomain: "nazimshopping-50025.firebaseapp.com",
  databaseURL: "https://nazimshopping-50025-default-rtdb.firebaseio.com",
  projectId: "nazimshopping-50025",
  storageBucket: "nazimshopping-50025.firebasestorage.app",
  messagingSenderId: "210879958596",
  appId: "1:210879958596:web:2e6eae529211ce811b7611",
  measurementId: "G-KF65H9H61W"
};

firebase.initializeApp(firebaseConfig);
const dbRef = firebase.database().ref('servers_list');

let servers = [];
let editingServerId = null; 

const $ = id => document.getElementById(id);

// دالة لجلب تاريخ اليوم بصيغة YYYY-MM-DD كقيمة احتياطية
function getTodayDate() {
  const today = new Date();
  const yyyy = today.getFullYear();
  let mm = today.getMonth() + 1; 
  let dd = today.getDate();
  if (mm < 10) mm = '0' + mm;
  if (dd < 10) dd = '0' + dd;
  return `${yyyy}-${mm}-${dd}`;
}

// دالة لضبط التاريخ التلقائي بناءً على آخر سيرفر مضاف
function setAutofillDate() {
  if (servers.length > 0) {
    // السيرفرات مرتبة تنازلياً، لذا فإن أول عنصر [0] هو آخر سيرفر مضاف
    const lastServer = servers[0];
    if (lastServer.expireDate) {
      $('inDate').value = lastServer.expireDate;
      return;
    }
  }
  $('inDate').value = getTodayDate();
}

// ---------- Parsing ----------
function parseUrl(raw){
  try{
    const u = new URL(raw.trim());
    return {
      host: u.hostname || '',
      username: u.searchParams.get('username') || '',
      password: u.searchParams.get('password') || '',
      valid: !!u.hostname
    };
  }catch(e){
    return { host:'', username:'', password:'', valid:false };
  }
}

function updatePreview(){
  const data = parseUrl($('inUrl').value);
  setPrev('prevHost', data.host);
  setPrev('prevUser', data.username);
  setPrev('prevPass', data.password);
}
function setPrev(id, val){
  const el = $(id);
  if(val){ el.textContent = val; el.classList.remove('empty'); }
  else { el.textContent = '—'; el.classList.add('empty'); }
}

// ---------- Storage ----------
function loadServers(){
  dbRef.on('value', (snapshot) => {
    const data = snapshot.val();
    servers = data ? Object.values(data) : [];
    servers.sort((a, b) => b.id.localeCompare(a.id));
    
    // إذا لم نكن في وضع التعديل، نملأ حقل التاريخ تلقائياً بآخر قيمة متوفرة
    if(!editingServerId) {
      setAutofillDate();
    }
    
    render();
  }, (error) => {
    showToast('خطأ في تحميل البيانات السحابية');
  });
}

function saveServers(){
  const dataObj = {};
  servers.forEach(s => { dataObj[s.id] = s; });
  dbRef.set(dataObj)
    .then(() => {
      showToast(editingServerId ? 'تم تحديث السيرفر بنجاح! 🎉' : 'تم الحفظ سحابياً بنجاح! 🎉');
      resetForm();
    })
    .catch((err) => {
      showToast('تعذر حفظ البيانات');
    });
}

// ---------- Add / Update ----------
$('btnAdd').addEventListener('click', (e) => {
  e.preventDefault(); 

  const name = $('inName').value.trim();
  const code = $('inCode').value.trim();
  const url = $('inUrl').value.trim();
  const expireDate = $('inDate').value;
  const status = document.querySelector('input[name="payStatus"]:checked').value;

  if(!name || !url){
    showToast('يرجى إدخال اسم السيرفر والرابط');
    return;
  }
  const parsed = parseUrl(url);
  if(!parsed.valid){
    showToast('الرابط غير صحيح');
    return;
  }

  if (editingServerId) {
    servers = servers.map(s => {
      if (s.id === editingServerId) {
        return { ...s, name, code, url, expireDate, host: parsed.host, username: parsed.username, password: parsed.password, status };
      }
      return s;
    });
  } else {
    const newServer = {
      id: Date.now().toString(36),
      name, code, url, expireDate,
      host: parsed.host,
      username: parsed.username,
      password: parsed.password,
      status
    };
    servers.unshift(newServer);
  }

  saveServers();
});

function startEdit(server) {
  editingServerId = server.id;
  $('inName').value = server.name;
  $('inCode').value = server.code || '';
  $('inUrl').value = server.url;
  $('inDate').value = server.expireDate || getTodayDate();
  document.querySelector(`input[name="payStatus"][value="${server.status}"]`).checked = true;
  updatePreview();

  $('formCard').classList.add('editing-mode');
  $('formTitle').textContent = 'تعديل بيانات السيرفر الحالي';
  $('btnAdd').textContent = 'تحديث البيانات وعمل مزامنة';
  $('btnAdd').classList.add('btn-edit');
  $('btnCancel').style.display = 'block';
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
  editingServerId = null;
  $('inName').value = '';
  $('inCode').value = '';
  $('inUrl').value = '';
  setAutofillDate(); // إعادة ملء حقل التاريخ بآخر قيمة سيرفر بعد التهيئة
  document.querySelector('input[name="payStatus"][value="paid"]').checked = true;
  updatePreview();

  $('formCard').classList.remove('editing-mode');
  $('formTitle').textContent = 'إضافة سيرفر جديد';
  $('btnAdd').textContent = 'إضافة السيرفر';
  $('btnAdd').classList.remove('btn-edit');
  $('btnCancel').style.display = 'none';
}

$('btnCancel').addEventListener('click', resetForm);
$('inUrl').addEventListener('input', updatePreview);
$('search').addEventListener('input', render);

// ---------- Render ----------
function render(){
  const term = $('search').value.trim().toLowerCase();
  const filtered = servers.filter(s =>
    s.name.toLowerCase().includes(term) ||
    s.host.toLowerCase().includes(term) ||
    (s.code && s.code.toLowerCase().includes(term))
  );

  $('statTotal').textContent = servers.length;
  $('statPaid').textContent = servers.filter(s=>s.status==='paid').length;
  $('statDue').textContent = servers.filter(s=>s.status==='due').length;

  const list = $('list');
  if(filtered.length === 0){
    list.innerHTML = `<div class="empty"><div class="big">📡</div>لا توجد سيرفرات${term ? ' مطابقة لبحثك' : ' بعد، أضف أول سيرفر من الأعلى'}</div>`;
    return;
  }

  list.innerHTML = filtered.map(s => `
    <div class="server-card ${s.status}">
      <div class="sc-top">
        <div class="sc-name-area">
          <div class="sc-name">
            <span class="led ${s.status}"></span>
            ${escapeHtml(s.name)}
          </div>
          <div class="sc-date">📅 نهاية الاشتراك: ${s.expireDate ? escapeHtml(s.expireDate) : 'غير محدد'}</div>
        </div>
        ${s.code ? `<div class="sc-code">${escapeHtml(s.code)}</div>` : ''}
      </div>
      <div class="sc-grid">
        <div class="sc-field" data-copy="${escapeAttr(s.host)}">
          <span class="lab">Host</span>
          <span class="v">${escapeHtml(s.host) || '—'}</span>
          <span class="copy">نسخ</span>
        </div>
        <div class="sc-field" data-copy="${escapeAttr(s.username)}">
          <span class="lab">User</span>
          <span class="v">${escapeHtml(s.username) || '—'}</span>
          <span class="copy">نسخ</span>
        </div>
        <div class="sc-field" data-copy="${escapeAttr(s.password)}">
          <span class="lab">Pass</span>
          <span class="v">${escapeHtml(s.password) || '—'}</span>
          <span class="copy">نسخ</span>
        </div>
      </div>
      <div class="sc-actions">
        <div class="pill status-toggle ${s.status}" data-action="toggle" data-id="${s.id}">
          ${s.status === 'paid' ? '✓ مدفوع' : '⚠ عليه دين'} — تبديل
        </div>
        <div class="pill" data-action="copylink" data-id="${s.id}">نسخ الرابط</div>
        <div class="pill edit-btn" data-action="edit" data-id="${s.id}">تعديل 📝</div>
        <div class="pill danger" data-action="delete" data-id="${s.id}">حذف</div>
      </div>
    </div>
  `).join('');
}

function escapeHtml(str){
  return (str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){
  return escapeHtml(str).replace(/`/g,'&#96;');
}

// ---------- Delegated actions ----------
$('list').addEventListener('click', (e) => {
  const copyField = e.target.closest('.sc-field');
  if(copyField){
    const text = copyField.getAttribute('data-copy');
    if(text) copyToClipboard(text, 'تم نسخ القيمة');
    return;
  }

  const action = e.target.closest('[data-action]');
  if(!action) return;
  const id = action.getAttribute('data-id');
  const server = servers.find(s => s.id === id);
  if(!server) return;

  if(action.dataset.action === 'toggle'){
    server.status = server.status === 'paid' ? 'due' : 'paid';
    saveServers();
  } else if(action.dataset.action === 'edit'){
    startEdit(server);
  } else if(action.dataset.action === 'delete'){
    if(confirm(`حذف السيرفر "${server.name}"؟`)){
      servers = servers.filter(s => s.id !== id);
      if(editingServerId === id) resetForm();
      saveServers();
    }
  } else if(action.dataset.action === 'copylink'){
    copyToClipboard(server.url, 'تم نسخ الرابط الكامل');
  }
});

function copyToClipboard(text, msg){
  if(!text) return;
  navigator.clipboard.writeText(text).then(() => showToast(msg)).catch(() => showToast('تعذر النسخ'));
}

let toastTimer;
function showToast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

loadServers();
</script>
</body>
